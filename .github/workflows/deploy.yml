name: Deploy Application Docker Image to EC2 instance

on:
  push:
    branches: [feature/CI-CD]    #pushing code to this branch will trigger this workflow


jobs:
  build-docker-image-and-push-to-AWS-ECR:  
    name: Continuous Integration
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  

      - name: Login to AWS account
        uses: aws-actions/configure-aws-credentials@v4 
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr  
        uses: aws-actions/amazon-ecr-login@v2 

      - name: Build and push image to Amazon ECR
        id: build-image
        uses: docker/build-push-action@v5
        with:
            context: .
            file: dockerfiles/prod.dockerFile
            tags: ${{steps.login-ecr.outputs.registry}}/${{secrets.ECR_REPO}}:${{github.sha}}
            push: true

  pull-docker-image-from-AWS-ECR-and-run-it:   
      name: Continous Deployment
      needs: build-docker-image-and-push-to-AWS-ECR 
      runs-on: self-hosted  
      
      steps:
       - name: Checkout Repository
         uses: actions/checkout@v4 

       - name: Configure AWS credentials  
         uses: aws-actions/configure-aws-credentials@v1
         with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

       - name: Login to Amazon ECR  .
         id: login-ecr
         uses: aws-actions/amazon-ecr-login@v2

       - name: Deploy container with docker commands
         run: |
            # Stop existing containers
              docker stop auth-backend || true   #phasega nhi error pe
              docker rm auth-backend || true

            # Run image in container 
              docker run -d \
                --name auth-backend \
                --restart always \
                -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
                -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
                -e AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}" \
                -p 3000:3000 \
                "${{ steps.login-ecr.outputs.registry }}"/"${{ secrets.ECR_REPO }}":${{github.sha}}

            # Remove unnecessary images
              docker image prune -f