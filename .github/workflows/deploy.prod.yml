name: Deploy Application Docker Image to EC2 instance

on:
  push:
    branches: [feature/CI-CD]    


jobs:
  build-docker-image-and-push-to-AWS-ECR:  
    name: Continuous Integration
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  

      - name: Login to AWS account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr  
        uses: aws-actions/amazon-ecr-login@v1  

      - name: Build and push image to Amazon ECR
        id: build-image
        uses: docker/build-push-action@v5
        with:
            context: .
            file: dockerfiles/prod.dockerFile
            tags: ${{steps.login-ecr.outputs.registry}}/${{secrets.ECR_REPO}}:${{github.sha}}
            push: true

  pull-docker-image-from-AWS-ECR-and-run-it:   
      name: Continous Deployment
      needs: build-docker-image-and-push-to-AWS-ECR 
      runs-on: self-hosted  
      
      steps:
       - name: Checkout Repository
         uses: actions/checkout@v4 

       - name: Configure AWS credentials  
         uses: aws-actions/configure-aws-credentials@v4
         with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

       - name: Login to Amazon ECR  .
         id: login-ecr
         uses: aws-actions/amazon-ecr-login@v1

       - name: Create .env file
         run: |
             echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
             echo "GOOGLE_CLIENT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
             echo "GOOGLE_ID=${{ secrets.GOOGLE_ID }}" >> .env
             echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
             echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
             echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env

       - name: Deploy with docker-compose
         run: |
            # Export image tag to docker-compose
              export IMAGE_NAME="${{steps.login-ecr.outputs.registry}}/${{secrets.ECR_REPO}}:${{github.sha}}"

            # Use docker-compose to run container  
              docker-compose -f docker-compose.prod.yaml up -d --pull always

            # Remove unnecessary images
              docker image prune -f